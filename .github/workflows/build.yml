name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip wheel
        pip install "cython==0.29.36" "buildozer==1.5.0"

    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer/android/platform/android-sdk
          ~/.buildozer/android/platform/android-ndk-r25b
          ~/.buildozer/android/packages
        key: buildozer-${{ runner.os }}-sdk-ndk-v2

    - name: Install Android SDK cmdline-tools and accept licenses
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools

        # 下載最新 cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
          -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
        mkdir -p $SDK_ROOT/cmdline-tools/latest
        mv /tmp/cmdline-tools-extract/cmdline-tools/* $SDK_ROOT/cmdline-tools/latest/

        # 接受所有授權
        mkdir -p $SDK_ROOT/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_ROOT/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $SDK_ROOT/licenses/android-sdk-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" > $SDK_ROOT/licenses/android-sdk-preview-license

        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

        # 安裝 build-tools 和 platform-tools
        $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "build-tools;34.0.0" \
          "platform-tools" \
          "platforms;android-33" 2>&1 | tail -5

        echo "✅ SDK 安裝完成"
        ls $SDK_ROOT/build-tools/

    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        buildozer android debug 2>&1 | tee build.log | tail -30
        echo "=== BUILD DONE ==="
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Show error log if failed
      if: failure()
      run: |
        echo "=== Last 50 lines of build log ==="
        tail -50 build.log 2>/dev/null || true
        echo "=== Errors ==="
        grep -E "ERROR|error:|Exception|cannot" build.log 2>/dev/null | grep -v "^#" | tail -20 || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FileRenameTool-APK
        path: bin/*.apk
        if-no-files-found: error
